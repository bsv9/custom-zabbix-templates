              name: '{HOST.NAME}: Temperature {#TEMP_NAME} [{#TEMP_INDEX}]: Above {$TEMP.HIGH.WARN}C'
              priority: WARNING
              description: 'Temperature exceeds warning threshold.'
              tags:
