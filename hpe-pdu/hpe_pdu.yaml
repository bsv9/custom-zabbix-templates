zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 0f0d9e9b220d484da06401415e5af53c
      name: Templates/Power
  templates:
    - uuid: c61965573576478180493d59e6ff38cb
      template: 'HPE Managed PDU by SNMP'
      name: 'HPE Managed PDU by SNMP'
      description: |
        Zabbix template for HPE Managed (Metered and Switched) PDU.
        Tested on model P9S18A (230V, 32A, 7.4kVA, 50/60Hz, 24 outlets, 3 sections).
        MIB: CPQPOWER1.86.MIB - pdu3 branch (.1.3.6.1.4.1.232.165.11).

        Monitors: input power, per-phase/section metrics, per-outlet power,
        breaker groups, temperature/humidity probes, contact/door sensors.

        Requires SNMPv2c community string.
      vendor:
        name: HPE
        version: 7.4-1.7
      groups:
        - name: Templates/Power
      items:
        # --- Static Device Identification (poll daily) ---
        - uuid: fcd3519851ad45079b73d6fe2390e8d6
          name: 'PDU: Manufacturer'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.232.165.1.2.1.0
          key: hpePdu.manufacturer
          delay: 1d
          history: '{$HISTORY}'
          trends: '0'
          value_type: CHAR
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: inventory
        - uuid: 65ebb406cab34bcf80add61bfd65d50c
          name: 'PDU: Model'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.232.165.1.2.2.0
          key: hpePdu.model
          delay: 1d
          history: '{$HISTORY}'
          trends: '0'
          value_type: CHAR
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: inventory
        - uuid: 1276ad9fedee488fa027e6dc6963326a
          name: 'PDU: Firmware version'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.232.165.1.2.3.0
          key: hpePdu.firmware
          delay: 1d
          history: '{$HISTORY}'
          trends: '0'
          value_type: CHAR
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: inventory
          triggers:
            - uuid: 9557467c24b44f92851caa50807d514d
              expression: 'change(/HPE Managed PDU by SNMP/hpePdu.firmware)=1 and length(last(/HPE Managed PDU by SNMP/hpePdu.firmware))>0'
              name: '{HOST.NAME}: Firmware version has changed'
              priority: INFO
              description: 'PDU firmware version has changed. Verify the update was intentional.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: notice
        - uuid: 27cce156c7584c53aae0f30b28d70fea
          name: 'PDU: Part number'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.232.165.1.2.6.0
          key: hpePdu.partNumber
          delay: 1d
          history: '{$HISTORY}'
          trends: '0'
          value_type: CHAR
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: inventory
        - uuid: 19875385aa4e405498803234f74c2818
          name: 'PDU: Serial number'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.232.165.1.2.7.0
          key: hpePdu.serial
          delay: 1d
          history: '{$HISTORY}'
          trends: '0'
          value_type: CHAR
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: inventory
        - uuid: b7a176ed71b64b44a88dbf9d3bb0ae96
          name: 'PDU: MAC address'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.232.165.1.2.8.0
          key: hpePdu.mac
          delay: 1d
          history: '{$HISTORY}'
          trends: '0'
          value_type: CHAR
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: inventory
        - uuid: 6803dd75eedf4eca9d2e32043d1aa088
          name: 'PDU: Device rating'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.232.165.11.1.2.1.3.1
          key: hpePdu.rating
          delay: 1d
          history: '{$HISTORY}'
          trends: '0'
          value_type: CHAR
          description: 'PDU electrical rating (e.g. "230V, 32A, 7.4kVA, 50/60Hz")'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: inventory
        - uuid: cf070fe9e89747788e0c875423e096c0
          name: 'PDU: Device name'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.232.165.1.1.3.0
          key: hpePdu.deviceName
          delay: 1d
          history: '{$HISTORY}'
          trends: '0'
          value_type: CHAR
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: inventory
        - uuid: f607a672115c49f78ce4cde7ec52dcda
          name: 'PDU: Outlet count'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.232.165.11.1.2.1.13.1
          key: hpePdu.outletCount
          delay: 1d
          history: '{$HISTORY}'
          trends: '0'
          value_type: UNSIGNED
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: inventory
        - uuid: 03fddf1ce254460cb7736d282334f0fc
          name: 'SNMP traps (fallback)'
          type: SNMP_TRAP
          key: snmptrap.fallback
          delay: '0'
          history: '{$HISTORY}'
          trends: '0'
          value_type: LOG
          logtimefmt: 'hh:mm:sszyyyy/MM/dd'
          tags:
            - tag: component
              value: network
        # --- SNMP Availability ---
        - uuid: d756bcd111734d86bd727d505b1933a3
          name: '{HOST.NAME}: SNMP agent availability'
          type: INTERNAL
          key: 'zabbix[host,snmp,available]'
          delay: '{$UPDATEINT}'
          history: '{$HISTORY}'
          trends: '{$TRENDS}'
          valuemap:
            name: 'SNMP Availability'
          tags:
            - tag: component
              value: network
          triggers:
            - uuid: da9421190a884648a8052e3e3997e9ec
              expression: 'max(/HPE Managed PDU by SNMP/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
              name: '{HOST.NAME}: No SNMP data collection'
              priority: WARNING
              description: 'SNMP is not available for polling. Check SNMP community, device connectivity, and firewall rules.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: availability
        # --- MIB-II Standard Items ---
        - uuid: c9cb7773a5e743b4b4822e92537784ee
          name: 'System description'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.2.1.1.1.0'
          key: system.descr
          delay: 1h
          history: '{$HISTORY}'
          trends: '0'
          value_type: CHAR
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: system
        - uuid: eedd17c0676e4960941abf3fd2f8bd7f
          name: 'System name'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.2.1.1.5.0'
          key: system.name
          delay: 1h
          history: '{$HISTORY}'
          trends: '0'
          value_type: CHAR
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: system
        - uuid: ca48140e783449a59316d9d43856e3ed
          name: 'System uptime'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.2.1.1.3.0'
          key: system.uptime
          delay: 1m
          history: '{$HISTORY}'
          trends: '{$TRENDS}'
          units: uptime
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: 586e5d4e7e794925be438663cd7970d0
              expression: 'last(/HPE Managed PDU by SNMP/system.uptime)<600 and last(/HPE Managed PDU by SNMP/zabbix[host,snmp,available])=1'
              name: '{HOST.NAME}: Device has been restarted'
              priority: INFO
              description: 'Device uptime is less than 10 minutes, indicating a recent restart.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: notice
        - uuid: e3519a1d76864d59bfde78564a2cd3c4
          name: 'System contact'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.2.1.1.4.0'
          key: system.contact
          delay: 1h
          history: '{$HISTORY}'
          trends: '0'
          value_type: CHAR
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: system
        - uuid: a3bcd142e88242dd934ee89d68e813c0
          name: 'System location'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.2.1.1.6.0'
          key: system.location
          delay: 1h
          history: '{$HISTORY}'
          trends: '0'
          value_type: CHAR
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: system
        # --- Input Power (poll every UPDATEINT) ---
        - uuid: 6b48ee1a7316421fb255304578f79f2f
          name: 'Input: Frequency'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.232.165.11.2.1.1.2.1
          key: hpePdu.input.frequency
          delay: '{$UPDATEINT}'
          history: '{$HISTORY}'
          trends: '{$TRENDS}'
          value_type: FLOAT
          units: Hz
          description: 'Input line frequency. Raw value in 0.1 Hz.'
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.1'
          tags:
            - tag: component
              value: power-input
        - uuid: b2be593c8dc84252a741d159f54728a3
          name: 'Input: Frequency status'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.232.165.11.2.1.1.3.1
          key: hpePdu.input.frequencyStatus
          delay: '{$UPDATEINT}'
          history: '{$HISTORY}'
          trends: '{$TRENDS}'
          valuemap:
            name: 'Frequency Status'
          tags:
            - tag: component
              value: power-input
          triggers:
            - uuid: f4ba13d37d3248c6804bd1e9c3c51344
              expression: 'last(/HPE Managed PDU by SNMP/hpePdu.input.frequencyStatus)<>1 and last(/HPE Managed PDU by SNMP/zabbix[host,snmp,available])=1'
              name: '{HOST.NAME}: Input frequency out of range'
              priority: HIGH
              description: 'Input line frequency is outside acceptable range.'
              tags:
                - tag: scope
                  value: availability
        - uuid: eba99539cf6a45bcafcd2f845b6d0c03
          name: 'Input: Apparent power (VA)'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.232.165.11.2.1.1.4.1
          key: hpePdu.input.powerVA
          delay: '{$UPDATEINT}'
          history: '{$HISTORY}'
          trends: '{$TRENDS}'
          units: VA
          tags:
            - tag: component
              value: power-input
        - uuid: 9f57fdaf18704663a09aa992110d568a
          name: 'Input: Active power (W)'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.232.165.11.2.1.1.5.1
          key: hpePdu.input.powerWatts
          delay: '{$UPDATEINT}'
          history: '{$HISTORY}'
          trends: '{$TRENDS}'
          units: W
          tags:
            - tag: component
              value: power-input
        - uuid: 9a9e8accbe4d47fc9bdc2af38b89eb7b
          name: 'Input: Total energy (kWh)'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.232.165.11.2.1.1.6.1
          key: hpePdu.input.energy
          delay: '{$UPDATEINT.SLOW}'
          history: '{$HISTORY}'
          trends: '{$TRENDS}'
          units: kWh
          tags:
            - tag: component
              value: power-input
        - uuid: 7f4c3a5010f24d1691972a96844380c2
          name: 'Input: Power factor'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.232.165.11.2.1.1.9.1
          key: hpePdu.input.powerFactor
          delay: '{$UPDATEINT}'
          history: '{$HISTORY}'
          trends: '{$TRENDS}'
          value_type: FLOAT
          description: 'Input power factor. Raw value in 0.01 units.'
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: power-input
        - uuid: f689c718b9324b729de5fca34440ae94
          name: 'Input: Reactive power (VAR)'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.232.165.11.2.1.1.10.1
          key: hpePdu.input.powerVAR
          delay: '{$UPDATEINT}'
          history: '{$HISTORY}'
          trends: '{$TRENDS}'
          units: VAR
          tags:
            - tag: component
              value: power-input
      # ===== DISCOVERY RULES =====
      discovery_rules:
        # --- Discovery 1: Input Phase/Section ---
        - uuid: 94cf2ea3aa7046c2b01c0a4f859ec2e8
          name: 'Input phase discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#PHASE_INDEX},.1.3.6.1.4.1.232.165.11.2.2.1.1.1,{#PHASE_CURRENT_RATING},.1.3.6.1.4.1.232.165.11.2.2.1.10.1]'
          key: hpePdu.inputPhase.discovery
          delay: 1d
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          filter:
            evaltype: AND
            conditions:
              - macro: '{#SNMPINDEX}'
                value: '^[1-9]'
              - macro: '{#PHASE_INDEX}'
                value: '^[1-9]'
              - macro: '{#PHASE_CURRENT_RATING}'
                value: '^[1-9]'
          description: 'Discovers input phases/sections with non-zero current rating. Index 0 (totals row) is excluded by filtering both {#SNMPINDEX} and {#PHASE_INDEX}. Uses {#SNMPINDEX} (OID suffix) for unique keys; {#PHASE_INDEX} (OID value) for display.'
          item_prototypes:
            - uuid: ed3fa663b9204bf9be97a19a9e4b2531
              name: 'Phase {#PHASE_INDEX}: Voltage'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.232.165.11.2.2.1.3.1.{#SNMPINDEX}'
              key: 'hpePdu.phase.voltage[{#SNMPINDEX}]'
              delay: '{$UPDATEINT}'
              history: '{$HISTORY}'
              trends: '{$TRENDS}'
              value_type: FLOAT
              units: V
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '0.1'
              tags:
                - tag: component
                  value: power-phase
            - uuid: 7ab66da824fc4458bfc70890f8fba4a7
              name: 'Phase {#PHASE_INDEX}: Current rating'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.232.165.11.2.2.1.10.1.{#SNMPINDEX}'
              key: 'hpePdu.phase.currentRating[{#SNMPINDEX}]'
              delay: 1d
              history: '{$HISTORY}'
              trends: '{$TRENDS}'
              value_type: FLOAT
              units: A
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '0.01'
              tags:
                - tag: component
                  value: power-phase
            - uuid: 8f237c2bf6764fbb8d1198520d2da121
              name: 'Phase {#PHASE_INDEX}: Current'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.232.165.11.2.2.1.11.1.{#SNMPINDEX}'
              key: 'hpePdu.phase.current[{#SNMPINDEX}]'
              delay: '{$UPDATEINT}'
              history: '{$HISTORY}'
              trends: '{$TRENDS}'
              value_type: FLOAT
              units: A
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '0.01'
              tags:
                - tag: component
                  value: power-phase
            - uuid: 640148756edf4bf0ac8a36443eecb1ff
              name: 'Phase {#PHASE_INDEX}: Percent load'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.232.165.11.2.2.1.17.1.{#SNMPINDEX}'
              key: 'hpePdu.phase.percentLoad[{#SNMPINDEX}]'
              delay: '{$UPDATEINT}'
              history: '{$HISTORY}'
              trends: '{$TRENDS}'
              value_type: FLOAT
              units: '%'
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '0.1'
              tags:
                - tag: component
                  value: power-phase
            - uuid: 97985b58c9604dd0b28a2f13f1039cda
              name: 'Phase {#PHASE_INDEX}: Apparent power (VA)'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.232.165.11.2.2.1.19.1.{#SNMPINDEX}'
              key: 'hpePdu.phase.powerVA[{#SNMPINDEX}]'
              delay: '{$UPDATEINT}'
              history: '{$HISTORY}'
              trends: '{$TRENDS}'
              units: VA
              tags:
                - tag: component
                  value: power-phase
            - uuid: f36c57df9c0f4089ac9117da52aafd22
              name: 'Phase {#PHASE_INDEX}: Active power (W)'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.232.165.11.2.2.1.20.1.{#SNMPINDEX}'
              key: 'hpePdu.phase.powerWatts[{#SNMPINDEX}]'
              delay: '{$UPDATEINT}'
              history: '{$HISTORY}'
              trends: '{$TRENDS}'
              units: W
              tags:
                - tag: component
                  value: power-phase
            - uuid: ee42409a94f0453dabd62a7a88b5a989
              name: 'Phase {#PHASE_INDEX}: Energy (kWh)'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.232.165.11.2.2.1.21.1.{#SNMPINDEX}'
              key: 'hpePdu.phase.energy[{#SNMPINDEX}]'
              delay: '{$UPDATEINT.SLOW}'
              history: '{$HISTORY}'
              trends: '{$TRENDS}'
              units: kWh
              tags:
                - tag: component
                  value: power-phase
            - uuid: b0dfcf6d2d8b415986fe0595a9b8b08c
              name: 'Phase {#PHASE_INDEX}: Power factor'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.232.165.11.2.2.1.23.1.{#SNMPINDEX}'
              key: 'hpePdu.phase.powerFactor[{#SNMPINDEX}]'
              delay: '{$UPDATEINT}'
              history: '{$HISTORY}'
              trends: '{$TRENDS}'
              value_type: FLOAT
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '0.01'
              tags:
                - tag: component
                  value: power-phase
          trigger_prototypes:
            - uuid: ccf043c0b2e3450f99a6473c4499528b
              expression: 'last(/HPE Managed PDU by SNMP/hpePdu.phase.voltage[{#SNMPINDEX}])>{$VOLTAGE.HIGH.WARN} and last(/HPE Managed PDU by SNMP/zabbix[host,snmp,available])=1'
              name: '{HOST.NAME}: Phase {#PHASE_INDEX}: Voltage too high (>{$VOLTAGE.HIGH.WARN}V)'
              priority: WARNING
              description: 'Phase voltage exceeds high warning threshold.'
              tags:
                - tag: scope
                  value: performance
            - uuid: 79f49bf2a1d74e92a087ed4adf2acfd4
              expression: 'last(/HPE Managed PDU by SNMP/hpePdu.phase.voltage[{#SNMPINDEX}])<{$VOLTAGE.LOW.WARN} and last(/HPE Managed PDU by SNMP/zabbix[host,snmp,available])=1'
              name: '{HOST.NAME}: Phase {#PHASE_INDEX}: Voltage too low (<{$VOLTAGE.LOW.WARN}V)'
              priority: WARNING
              description: 'Phase voltage is below low warning threshold.'
              tags:
                - tag: scope
                  value: performance
            - uuid: 95aee41420114c7ca09370fd88255681
              expression: 'last(/HPE Managed PDU by SNMP/hpePdu.phase.current[{#SNMPINDEX}])>{$INPUT.CURRENT.WARN} and last(/HPE Managed PDU by SNMP/zabbix[host,snmp,available])=1'
              name: '{HOST.NAME}: Phase {#PHASE_INDEX}: Current above {$INPUT.CURRENT.WARN}A'
              priority: WARNING
              description: 'Phase current exceeds warning threshold.'
              tags:
                - tag: scope
                  value: capacity
            - uuid: b4eff5426c1c4686866a3dc528ce2379
              expression: 'last(/HPE Managed PDU by SNMP/hpePdu.phase.current[{#SNMPINDEX}])>{$INPUT.CURRENT.CRIT} and last(/HPE Managed PDU by SNMP/zabbix[host,snmp,available])=1'
              name: '{HOST.NAME}: Phase {#PHASE_INDEX}: Current above {$INPUT.CURRENT.CRIT}A'
              priority: HIGH
              description: 'Phase current exceeds critical threshold.'
              dependencies:
                - name: '{HOST.NAME}: Phase {#PHASE_INDEX}: Current above {$INPUT.CURRENT.WARN}A'
                  expression: 'last(/HPE Managed PDU by SNMP/hpePdu.phase.current[{#SNMPINDEX}])>{$INPUT.CURRENT.WARN} and last(/HPE Managed PDU by SNMP/zabbix[host,snmp,available])=1'
              tags:
                - tag: scope
                  value: capacity
            - uuid: 6db8712241df4759bf29c98bf5c8cffe
              expression: 'last(/HPE Managed PDU by SNMP/hpePdu.phase.percentLoad[{#SNMPINDEX}])>{$SECTION.LOAD.WARN} and last(/HPE Managed PDU by SNMP/zabbix[host,snmp,available])=1'
              name: '{HOST.NAME}: Phase {#PHASE_INDEX}: Load above {$SECTION.LOAD.WARN}%'
              priority: WARNING
              description: 'Section/phase load exceeds warning threshold.'
              tags:
                - tag: scope
                  value: capacity
            - uuid: a6f9f713ba0c41069fb48a0dfc6ec65d
              expression: 'last(/HPE Managed PDU by SNMP/hpePdu.phase.percentLoad[{#SNMPINDEX}])>{$SECTION.LOAD.CRIT} and last(/HPE Managed PDU by SNMP/zabbix[host,snmp,available])=1'
              name: '{HOST.NAME}: Phase {#PHASE_INDEX}: Load above {$SECTION.LOAD.CRIT}%'
              priority: HIGH
              description: 'Section/phase load exceeds critical threshold.'
              dependencies:
                - name: '{HOST.NAME}: Phase {#PHASE_INDEX}: Load above {$SECTION.LOAD.WARN}%'
                  expression: 'last(/HPE Managed PDU by SNMP/hpePdu.phase.percentLoad[{#SNMPINDEX}])>{$SECTION.LOAD.WARN} and last(/HPE Managed PDU by SNMP/zabbix[host,snmp,available])=1'
              tags:
                - tag: scope
                  value: capacity
