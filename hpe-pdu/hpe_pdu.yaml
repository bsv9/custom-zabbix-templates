                  expression: 'last(/HPE Managed PDU by SNMP/hpePdu.humid.value[{#HUMID_INDEX}])<{$HUMID.LOW.WARN} and last(/HPE Managed PDU by SNMP/zabbix[host,snmp,available])=1'
              tags:
                - tag: scope
                  value: environment
            - uuid: fc48ca80f6a74d94896bfacd91bd4137
              expression: 'last(/HPE Managed PDU by SNMP/hpePdu.humid.probeStatus[{#HUMID_INDEX}])<>2 and last(/HPE Managed PDU by SNMP/zabbix[host,snmp,available])=1'
              name: '{HOST.NAME}: Humidity {#HUMID_NAME} [{#HUMID_INDEX}]: Probe disconnected'
              priority: WARNING
              description: 'Humidity probe has been disconnected.'
              tags:
                - tag: scope
                  value: availability
          graph_prototypes:
            - uuid: ad05ca87489343d18021d5e9134418ae
              name: 'Humidity {#HUMID_NAME} [{#HUMID_INDEX}]'
              graph_items:
                - sortorder: '0'
                  color: 2774A4
                  item:
                    host: 'HPE Managed PDU by SNMP'
                    key: 'hpePdu.humid.value[{#HUMID_INDEX}]'
        # --- Discovery 6: Contact/Door Sensors ---
        - uuid: 91fa44ec0dd8468ebfec06aa51584695
          name: 'Contact sensor discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#CONTACT_INDEX},.1.3.6.1.4.1.232.165.11.4.4.1.1.1,{#CONTACT_NAME},.1.3.6.1.4.1.232.165.11.4.4.1.2.1,{#CONTACT_PROBE_STATUS},.1.3.6.1.4.1.232.165.11.4.4.1.3.1]'
          key: hpePdu.contact.discovery
          delay: 1d
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          filter:
            conditions:
              - macro: '{#CONTACT_PROBE_STATUS}'
                value: '^2$'
          description: 'Discovers connected contact/door sensors. Only probes with status=2 (connected) are discovered.'
          item_prototypes:
            - uuid: f4a5b6c7d8e940f1a2b3c4d5e6f7a8b9
              name: 'Contact {#CONTACT_NAME} [{#CONTACT_INDEX}]: State'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.232.165.11.4.4.1.4.1.{#CONTACT_INDEX}'
              key: 'hpePdu.contact.state[{#CONTACT_INDEX}]'
              delay: '{$UPDATEINT}'
              history: '{$HISTORY}'
              trends: '{$TRENDS}'
              valuemap:
                name: 'Contact State'
              tags:
                - tag: component
                  value: environment
            - uuid: a5b6c7d8e9f041a2b3c4d5e6f7a8b9c0
              name: 'Contact {#CONTACT_NAME} [{#CONTACT_INDEX}]: Probe status'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.232.165.11.4.4.1.3.1.{#CONTACT_INDEX}'
              key: 'hpePdu.contact.probeStatus[{#CONTACT_INDEX}]'
              delay: '{$UPDATEINT}'
              history: '{$HISTORY}'
              trends: '{$TRENDS}'
              valuemap:
                name: 'Probe Status'
              tags:
                - tag: component
                  value: environment
          trigger_prototypes:
            - uuid: ff62b274bf2644a68b2beaf81248c601
              expression: 'last(/HPE Managed PDU by SNMP/hpePdu.contact.state[{#CONTACT_INDEX}])=1 and last(/HPE Managed PDU by SNMP/zabbix[host,snmp,available])=1'
              name: '{HOST.NAME}: Contact {#CONTACT_NAME} [{#CONTACT_INDEX}]: Door/contact opened'
              priority: WARNING
              description: 'Door switch or contact sensor has been opened.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: security
